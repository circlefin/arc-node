# 14 nodes (7 validators, 4 sentries, 1 relay, 2 full) across 6 subnets.
# Mostly hub-and-spoke: each sentry bridges one isolated subnet to untrusted,
# except group1 which uses a two-hop bridge (sentry2 + relay1).
# Validators are isolated within a single subnet; full nodes sit on untrusted only.
#
#   ┌──────────────┐  ┌────────────────┐  ┌──────────────┐  ┌──────────────┐
#   │  _trusted_   │  │  _group1_ext_  │  │   _group2_   │  │  _external_  │
#   │              │  │                │  │              │  │              │
#   │  validator1  │  │  validator3    │  │  validator5  │  │  validator6  │
#   │  validator2  │  │  validator4    │  │              │  │  validator7  │
#   └──────┬───────┘  └───────┬────────┘  └──────┬───────┘  └──────┬───────┘
#       sentry1            sentry2            sentry3           sentry4
#          │            ┌─────┴──────┐           │                 │
#          │            │  _group1_  │           │                 │
#          │            │   relay1   │           │                 │
#          │            └─────┬──────┘           │                 │
#   ┌──────┴──────────────────┴──────────────────┴─────────────────┴─────┐
#   │                            _untrusted_                             │
#   │                           full1   full2                            │
#   └────────────────────────────────────────────────────────────────────┘

cl.config.discovery_num_inbound_peers = 2
cl.config.discovery_num_outbound_peers = 2

[node_groups]
TRUSTED_VALIDATORS = ["validator1", "validator2"]
GROUP1_VALIDATORS = ["validator3", "validator4"]
EXTERNAL_VALIDATORS = ["validator6", "validator7"]

[nodes.validator1]
subnets = ["trusted"]
cl_persistent_peers = ["TRUSTED_VALIDATORS"]
cl_gossipsub.explicit_peering = true
el.config.trusted_peers = ["TRUSTED_VALIDATORS"]

[nodes.validator2]
subnets = ["trusted"]
cl_persistent_peers = ["TRUSTED_VALIDATORS"]

[nodes.validator3]
subnets = ["group1_ext"]

[nodes.validator4]
subnets = ["group1_ext"]

[nodes.validator5]
subnets = ["group2"]

[nodes.validator6]
subnets = ["external"]
cl_persistent_peers = ["EXTERNAL_VALIDATORS"]

[nodes.validator7]
subnets = ["external"]
el.config.trusted_peers = ["EXTERNAL_VALIDATORS"]

[nodes.sentry1]
subnets = ["trusted", "untrusted"]
cl_gossipsub.mesh_prioritization = true
cl_gossipsub.load = "high"
el.config.trusted_peers = ["TRUSTED_VALIDATORS"]
el.config.disable_discovery = true

[nodes.relay1]
subnets = ["group1", "untrusted"]

[nodes.sentry2]
subnets = ["group1", "group1_ext"]
el.config.trusted_peers = ["GROUP1_VALIDATORS"]

[nodes.sentry3]
subnets = ["group2", "untrusted"]

[nodes.sentry4]
subnets = ["external", "untrusted"]

[nodes.full1]
subnets = ["untrusted"]

[nodes.full2]
subnets = ["untrusted"]
