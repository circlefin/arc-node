name = "nightly-tx-propagation"
description = "Nightly sentry-topology transaction propagation check after a quiet period."

# Four validators are isolated behind two sentries. Full nodes connect to the
# sentries, but sentries only trust validators for transaction propagation.

[node_groups]
SENTRIES = ["sentry-1", "sentry-2"]
FULLNODES = ["full-blue", "full-green", "full-purple"]

[nodes.validator1]
subnets = ["trusted"]
cl_persistent_peers = ["SENTRIES", "ALL_VALIDATORS"]
cl_persistent_peers_only = true
cl_gossipsub.explicit_peering = true
cl_suggested_fee_recipient = "0x1111111111111111111111111111111111111111"
[nodes.validator1.el.config]
trusted_peers = ["SENTRIES", "ALL_VALIDATORS"]
trusted_only = true
disable_discovery = true

[nodes.validator2]
subnets = ["trusted"]
cl_persistent_peers = ["SENTRIES", "ALL_VALIDATORS"]
cl_persistent_peers_only = true
cl_gossipsub.explicit_peering = true
cl_suggested_fee_recipient = "0x2222222222222222222222222222222222222222"
[nodes.validator2.el.config]
trusted_peers = ["SENTRIES", "ALL_VALIDATORS"]
trusted_only = true
disable_discovery = true

[nodes.validator3]
subnets = ["trusted"]
cl_persistent_peers = ["SENTRIES", "ALL_VALIDATORS"]
cl_persistent_peers_only = true
cl_gossipsub.explicit_peering = true
cl_suggested_fee_recipient = "0x3333333333333333333333333333333333333333"
[nodes.validator3.el.config]
trusted_peers = ["SENTRIES", "ALL_VALIDATORS"]
trusted_only = true
disable_discovery = true

[nodes.validator4]
subnets = ["trusted"]
cl_persistent_peers = ["SENTRIES", "ALL_VALIDATORS"]
cl_persistent_peers_only = true
cl_gossipsub.explicit_peering = true
cl_suggested_fee_recipient = "0x4444444444444444444444444444444444444444"
[nodes.validator4.el.config]
trusted_peers = ["SENTRIES", "ALL_VALIDATORS"]
trusted_only = true
disable_discovery = true

[nodes.sentry-1]
subnets = ["trusted", "untrusted"]
cl_persistent_peers = ["sentry-2", "ALL_VALIDATORS"]
cl_gossipsub.explicit_peering = true
cl_gossipsub.load = "high"
[nodes.sentry-1.el.config]
trusted_peers = ["ALL_VALIDATORS"]
tx_propagation_policy = "Trusted"
disable_discovery = true

[nodes.sentry-2]
subnets = ["trusted", "untrusted"]
cl_persistent_peers = ["sentry-1", "ALL_VALIDATORS"]
cl_gossipsub.explicit_peering = true
cl_gossipsub.load = "high"
[nodes.sentry-2.el.config]
trusted_peers = ["ALL_VALIDATORS"]
tx_propagation_policy = "Trusted"
disable_discovery = true

[nodes.full-blue]
subnets = ["untrusted"]
cl_persistent_peers = ["sentry-1", "sentry-2"]
[nodes.full-blue.el.config]
trusted_peers = ["sentry-1", "sentry-2"]
tx_propagation_policy = "Trusted"
disable_discovery = true

[nodes.full-green]
subnets = ["untrusted"]
cl_persistent_peers = ["sentry-1", "sentry-2"]
[nodes.full-green.el.config]
trusted_peers = ["sentry-1", "sentry-2"]
tx_propagation_policy = "Trusted"
disable_discovery = true

[nodes.full-purple]
subnets = ["untrusted"]
cl_persistent_peers = ["sentry-1", "sentry-2"]
[nodes.full-purple.el.config]
trusted_peers = ["sentry-1", "sentry-2"]
tx_propagation_policy = "Trusted"
disable_discovery = true
